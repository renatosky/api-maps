<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opusky Server</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Garante que o corpo ocupe 100% da altura da tela e remova o scroll */
        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden; 
            background-color: #f8f9fa; /* Cor de fundo leve (ajustável) */
        }

        .main-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-img {
            max-width: 300px; /* Ajuste o tamanho máximo da sua logo aqui */
            width: 100%;
            height: auto;
            /* Efeito suave de entrada */
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <main class="main-container">
        <div class="text-center">
            <img src="https://lh3.googleusercontent.com/u/0/d/1mUa4mwkhrxe2KKOkxvgOnfeLQQK_GzuQ" alt="Logo do Servidor" class="logo-img">
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
